<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon — Kyle & Elly's Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
  <style>
    :root {
      --white:            #fdfdfb;
      --eucalyptus:       #9caf88;
      --eucalyptus-dark:  #7a8f6a;
      --purple:           #a89bc9;
      --purple-dark:      #8b7db8;
      --text:             #4a4a4a;
      --muted:            #999;
    }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      margin: 0;
      padding: 60px 20px;
      color: var(--text);
      background: var(--white);
      text-align: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    h1 {
      font-family: 'Alex Brush', Georgia, cursive;
      font-size: 58px;
      color: var(--eucalyptus-dark);
      font-weight: normal;
      margin: 0 0 8px 0;
      line-height: 1;
    }
    .subtitle {
      font-family: 'Alex Brush', Georgia, cursive;
      font-size: 36px;
      color: var(--purple-dark);
      margin-bottom: 40px;
    }
    .icon {
      font-size: 64px;
      margin: 20px 0;
    }
    p {
      max-width: 380px;
      margin: 12px auto;
      line-height: 1.5;
      font-size: 16px;
    }
    .back-btn {
      display: inline-block;
      margin-top: 32px;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--eucalyptus) 0%, var(--eucalyptus-dark) 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 4px 12px rgba(156, 175, 136, 0.4);
    }
    .hint {
      color: var(--muted);
      font-style: italic;
      font-size: 13px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <h1>Coming Soon</h1>
  <div class="subtitle">🚧 Under Construction 🚧</div>

  <div class="icon">💚</div>

  <p>We're still setting this up for you!</p>
  <p>Please check back closer to the wedding day, or use the photobook link to view photos in the meantime.</p>

  <a class="back-btn" href="index.html"> ← Back to Photobook</a>

  <p class="hint">With love, Kyle & Elly</p>
</body>
</html>
