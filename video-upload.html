<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Videos · Kyle & Elly's Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preload" href="fonts/alex-brush-latin-regular.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Warm up connections to both endpoints -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>

  <style>
    @font-face {
      font-family: 'Alex Brush';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('fonts/alex-brush-latin-regular.woff2') format('woff2');
    }

    :root {
      --white:            #fdfdfb;
      --eucalyptus:       #9caf88;
      --eucalyptus-dark:  #7a8f6a;
      --purple:           #a89bc9;
      --purple-dark:      #8b7db8;
      --coral:            #d4a5a5;
      --coral-dark:       #b88585;
      --text:             #4a4a4a;
      --muted:            #999;
      --success:          #7a8f6a;
      --error:            #b85555;
    }

    * { box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      margin: 0;
      padding: 40px 20px;
      color: var(--text);
      background-color: var(--white);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300' viewBox='0 0 300 300'><g fill='none' stroke='%239caf88' stroke-width='1.2' opacity='0.35'><path d='M50 40 Q70 60 60 100 Q50 130 70 160'/><ellipse cx='55' cy='55' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(-30 55 55)'/><ellipse cx='68' cy='80' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(20 68 80)'/><ellipse cx='58' cy='105' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(-25 58 105)'/><ellipse cx='72' cy='130' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(15 72 130)'/><ellipse cx='63' cy='155' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(-20 63 155)'/><path d='M200 200 Q220 220 210 260 Q200 285 215 300'/><ellipse cx='205' cy='210' rx='6' ry='12' fill='%239caf88' opacity='0.5' transform='rotate(-30 205 210)'/><ellipse cx='215' cy='232' rx='6' ry='12' fill='%239caf88' opacity='0.5' transform='rotate(20 215 232)'/><ellipse cx='208' cy='255' rx='6' ry='12' fill='%239caf88' opacity='0.5' transform='rotate(-25 208 255)'/><ellipse cx='218' cy='280' rx='6' ry='12' fill='%239caf88' opacity='0.5' transform='rotate(15 218 280)'/><path d='M240 60 Q220 80 230 110 Q245 135 225 165'/><ellipse cx='237' cy='72' rx='6' ry='12' fill='%239caf88' opacity='0.5' transform='rotate(30 237 72)'/><ellipse cx='225' cy='92' rx='6' ry='12' fill='%239caf88' opacity='0.5' transform='rotate(-20 225 92)'/><ellipse cx='233' cy='118' rx='6' ry='12' fill='%239caf88' opacity='0.5' transform='rotate(25 233 118)'/><ellipse cx='222' cy='142' rx='6' ry='12' fill='%239caf88' opacity='0.5' transform='rotate(-15 222 142)'/></g></svg>");
      background-repeat: repeat;
      background-size: 300px 300px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin: 10px 0 8px 0;
      font-weight: normal;
      line-height: 1.1;
      color: var(--eucalyptus-dark);
    }

    h1 .couple {
      font-family: 'Alex Brush', Georgia, cursive;
      font-size: 68px;
      display: block;
      line-height: 1;
    }

    h1 .subtitle {
      font-family: 'Alex Brush', Georgia, cursive;
      font-size: 42px;
      color: var(--coral-dark);
    }

    @media (max-width: 600px) {
      h1 .couple   { font-size: 52px; }
      h1 .subtitle { font-size: 34px; }
    }

    .tagline {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      margin: 0 0 28px 0;
    }

    .card {
      max-width: 480px;
      margin: 0 auto 20px auto;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 16px rgba(74, 74, 74, 0.1);
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--eucalyptus-dark);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      font-family: Georgia, serif;
      font-size: 16px;
      color: var(--text);
      background: #fff;
      border: 1.5px solid #d8d8d8;
      border-radius: 10px;
      margin-bottom: 20px;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--coral);
    }

    .file-picker {
      position: relative;
      display: block;
      width: 100%;
      text-align: center;
      padding: 22px 20px;
      background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(74, 74, 74, 0.15);
      transition: transform 0.1s, box-shadow 0.15s;
    }

    .file-picker:active {
      transform: translateY(2px);
      box-shadow: 0 2px 6px rgba(74, 74, 74, 0.15);
    }

    .file-picker .emoji {
      display: block;
      font-size: 32px;
      margin-bottom: 6px;
    }

    .file-picker .sub {
      display: block;
      font-size: 13px;
      font-weight: normal;
      font-style: italic;
      opacity: 0.95;
      margin-top: 4px;
    }

    #fileInput {
      position: absolute;
      opacity: 0;
      width: 0.1px;
      height: 0.1px;
      overflow: hidden;
    }

    .file-info {
      margin-top: 16px;
      padding: 12px 14px;
      background: #f7f5f0;
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      display: none;
    }

    .file-info.visible { display: block; }

    .file-info .name {
      font-weight: 600;
      word-break: break-all;
    }

    .file-info .size {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .upload-btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 16px;
      background: linear-gradient(135deg, var(--eucalyptus) 0%, var(--eucalyptus-dark) 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: Georgia, serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(74, 74, 74, 0.15);
      transition: transform 0.1s, opacity 0.15s;
    }

    .upload-btn:active:not(:disabled) {
      transform: translateY(2px);
    }

    .upload-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .progress-wrap {
      margin-top: 20px;
      display: none;
    }

    .progress-wrap.visible { display: block; }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #ececec;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--eucalyptus) 0%, var(--eucalyptus-dark) 100%);
      transition: width 0.2s;
      border-radius: 10px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .status.visible { display: block; }

    .status.info {
      background: #f0ede6;
      color: var(--text);
    }

    .status.success {
      background: #eaf0e3;
      color: var(--success);
      font-weight: 600;
    }

    .status.error {
      background: #f5e0e0;
      color: var(--error);
      font-weight: 600;
    }

    .warning {
      max-width: 480px;
      margin: 0 auto 20px auto;
      padding: 12px 16px;
      background: rgba(212, 165, 165, 0.15);
      border-left: 3px solid var(--coral);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text);
      font-style: italic;
    }

    .back-link {
      display: block;
      text-align: center;
      margin: 24px auto 0 auto;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover { color: var(--eucalyptus-dark); }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin: 30px 0 10px 0;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>
    <span class="couple">Kyle and Elly's</span>
    <span class="subtitle">Video Uploads</span>
  </h1>

  <p class="tagline">Share your favorite moving moments 🎥</p>

  <div class="warning">
    <strong>Heads up:</strong> Videos can be large. On cellular data,
    uploads may take several minutes. Please keep this page open until it finishes.
  </div>

  <div class="card">
    <label for="guestName">Your name (optional)</label>
    <input type="text" id="guestName" placeholder="e.g. Aunt Carol" maxlength="40" autocomplete="name">

    <label for="fileInput">Choose a video</label>
    <label class="file-picker" for="fileInput">
      <span class="emoji">🎬</span>
      Pick a Video
      <span class="sub">MP4, MOV, or WebM · up to 500 MB</span>
    </label>
    <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/webm,video/*">

    <div class="file-info" id="fileInfo">
      <div class="name" id="fileName"></div>
      <div class="size" id="fileSize"></div>
    </div>

    <button class="upload-btn" id="uploadBtn" disabled>Upload Video</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text">
        <span id="progressPct">0%</span>
        <span id="progressBytes"></span>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <a class="back-link" href="index.html">← Back to photobook</a>

  <footer>Kyle & Elly · August 8th, 2026</footer>

  <script>
    // ============================================================
    // CONFIG — replace with your deployment URL
    // ============================================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqC9aycR1z37788CgWszk2G3YFA7hTaiyDf7T0An26JrLLbJTRNhdQn6BWJmW7pb7bGg/exec';

    const MAX_SIZE  = 500 * 1024 * 1024;   // 500 MB soft cap for guests
    const CHUNK     = 8   * 1024 * 1024;   // 8 MB chunks
    const MAX_RETRY = 3;

    // ============================================================
    // Warn if guest tries to leave mid-upload
    // ============================================================
    let uploadInProgress = false;
    window.addEventListener('beforeunload', (e) => {
      if (uploadInProgress) {
        e.preventDefault();
        e.returnValue = 'Your video is still uploading. Leave anyway?';
        return e.returnValue;
      }
    });

    // ============================================================
    // DOM refs
    // ============================================================
    const $ = (id) => document.getElementById(id);
    const guestNameEl = $('guestName');
    const fileInput   = $('fileInput');
    const fileInfo    = $('fileInfo');
    const fileNameEl  = $('fileName');
    const fileSizeEl  = $('fileSize');
    const uploadBtn   = $('uploadBtn');
    const progressWrap = $('progressWrap');
    const progressFill = $('progressFill');
    const progressPct  = $('progressPct');
    const progressBytes = $('progressBytes');
    const statusEl    = $('status');

    // Restore guest name if they've been here before
    try {
      const saved = localStorage.getItem('guestName');
      if (saved) guestNameEl.value = saved;
    } catch (_) {}

    guestNameEl.addEventListener('change', () => {
      try { localStorage.setItem('guestName', guestNameEl.value.trim()); } catch (_) {}
    });

    // ============================================================
    // File selection
    // ============================================================
    let selectedFile = null;

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (!file.type.startsWith('video/')) {
        showStatus('Please choose a video file.', 'error');
        return;
      }
      if (file.size > MAX_SIZE) {
        showStatus(`Video is too large (${formatBytes(file.size)}). Maximum size is 500 MB.`, 'error');
        return;
      }

      selectedFile = file;
      fileNameEl.textContent = file.name;
      fileSizeEl.textContent = formatBytes(file.size) + ' · ' + (file.type || 'video');
      fileInfo.classList.add('visible');
      uploadBtn.disabled = false;
      hideStatus();
    });

    // ============================================================
    // Upload button
    // ============================================================
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      guestNameEl.disabled = true;
      fileInput.disabled = true;
      progressWrap.classList.add('visible');
      uploadInProgress = true;

      const guestName = guestNameEl.value.trim() || 'anonymous';

      try {
        await uploadVideo(selectedFile, guestName);
        showStatus('✓ Video uploaded successfully! Thank you 💚', 'success');
        // Allow another upload
        resetForNextUpload();
      } catch (err) {
        console.error(err);
        showStatus('Upload failed: ' + err.message + '. Please try again.', 'error');
        uploadBtn.disabled = false;
        guestNameEl.disabled = false;
        fileInput.disabled = false;
      } finally {
        uploadInProgress = false;
      }
    });

    function resetForNextUpload() {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      uploadBtn.disabled = true;
      guestNameEl.disabled = false;
      fileInput.disabled = false;
      // Leave progress at 100% as a positive signal
    }

    // ============================================================
    // Core upload flow
    // ============================================================
    async function uploadVideo(file, guestName) {
      showStatus('Preparing upload…', 'info');
      updateProgress(0, file.size, 0);

      // 1. Ask Apps Script for a resumable upload URL
      const init = await callAppsScript({
        action:    'initVideoUpload',
        filename:  file.name,
        mimeType:  file.type || 'video/mp4',
        sizeBytes: file.size,
        guestName: guestName,
        origin:    window.location.origin   // ← this line
      });

      if (init.error) throw new Error(init.error);
      if (!init.uploadUrl) throw new Error('no upload URL received');

      const uploadUrl = init.uploadUrl;
      const safeName  = init.safeName;

      // 2. PUT chunks directly to Google Drive
      showStatus('Uploading…', 'info');
      let offset = 0;
      let attempts = 0;
      let fileId = null;

      while (offset < file.size) {
        const end = Math.min(offset + CHUNK, file.size);
        const chunk = file.slice(offset, end);

        try {
          const resp = await fetch(uploadUrl, {
            method: 'PUT',
            headers: {
              'Content-Range': `bytes ${offset}-${end - 1}/${file.size}`
            },
            body: chunk
          });

          if (resp.status === 308) {
            // More chunks needed
            const range = resp.headers.get('Range');
            offset = range ? parseInt(range.split('-')[1], 10) + 1 : end;
            attempts = 0;
          } else if (resp.ok) {
            const meta = await resp.json();
            fileId = meta.id;
            offset = file.size;
          } else if (resp.status >= 500 && attempts < MAX_RETRY) {
            attempts++;
            showStatus(`Network hiccup — retrying (${attempts}/${MAX_RETRY})…`, 'info');
            await sleep(1000 * attempts);
            continue;
          } else {
            const text = await resp.text().catch(() => '');
            throw new Error(`server returned ${resp.status} ${text.slice(0, 120)}`);
          }
        } catch (err) {
          // Network error — retry the same chunk
          if (attempts < MAX_RETRY) {
            attempts++;
            showStatus(`Connection lost — retrying (${attempts}/${MAX_RETRY})…`, 'info');
            await sleep(1500 * attempts);
            continue;
          }
          throw err;
        }

        updateProgress(offset, file.size);
      }

      if (!fileId) throw new Error('upload finished but no file ID returned');

      // 3. Tell Apps Script we're done (fire-and-forget style — don't fail on this)
      showStatus('Finishing up…', 'info');
      try {
        await callAppsScript({
          action: 'finalizeVideoUpload',
          fileId: fileId,
          guestName: guestName,
          safeName: safeName,
          sizeBytes: file.size
        });
      } catch (err) {
        // The file is safely in Drive; logging failure isn't fatal.
        console.warn('finalize failed:', err);
      }

      updateProgress(file.size, file.size);
    }

    // ============================================================
    // Helpers
    // ============================================================

    // Send JSON to Apps Script without triggering a CORS preflight.
    // Trick: use text/plain body (browser default with no Content-Type header)
    async function callAppsScript(payload) {
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        redirect: 'follow'
      });
      if (!resp.ok) throw new Error(`Apps Script returned ${resp.status}`);
      return resp.json();
    }

    function updateProgress(loaded, total, pctOverride) {
      const pct = pctOverride !== undefined
        ? pctOverride
        : Math.min(100, Math.round((loaded / total) * 100));
      progressFill.style.width = pct + '%';
      progressPct.textContent = pct + '%';
      progressBytes.textContent = `${formatBytes(loaded)} / ${formatBytes(total)}`;
    }

    function showStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = 'status visible ' + (kind || 'info');
    }

    function hideStatus() {
      statusEl.className = 'status';
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  </script>
</body>
</html>
