<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kyle & Elly's Wedding Guest Photobook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Warm up the connection to Google before the tap -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════════

       Backup:  AKfycbxc_CSUS3Cp8mCXCmU4WCfvBHgYcDnongVcniHUYOU3X-8O9oQo73x_aZUwtxajUsiz

  <!-- ═══════════════════════════════════════════════

  <style>
    :root {
      --white:            #fdfdfb;
      --eucalyptus:       #9caf88;
      --eucalyptus-dark:  #7a8f6a;
      --purple:           #a89bc9;
      --purple-dark:      #8b7db8;
      --text:             #4a4a4a;
      --muted:            #999;
    }

    * { box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      margin: 0;
      padding: 40px 20px;
      color: var(--text);
      background-color: var(--white);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300' viewBox='0 0 300 300'><g fill='none' stroke='%239caf88' stroke-width='1.2' opacity='0.35'><path d='M50 40 Q70 60 60 100 Q50 130 70 160'/><ellipse cx='55' cy='55' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(-30 55 55)'/><ellipse cx='68' cy='80' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(20 68 80)'/><ellipse cx='58' cy='105' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(-25 58 105)'/><ellipse cx='72' cy='130' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(15 72 130)'/><ellipse cx='63' cy='155' rx='7' ry='14' fill='%239caf88' opacity='0.5' transform='rotate(-20 63 155)'/></g></svg>");
      background-repeat: repeat;
      background-size: 300px 300px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin: 10px 0 8px 0;
      font-weight: normal;
      line-height: 1.1;
      color: var(--eucalyptus-dark);
    }

    h1 .couple {
      font-family: 'Alex Brush', Georgia, cursive;
      font-size: 68px;
      display: block;
      line-height: 1;
    }

    h1 .subtitle {
      font-family: 'Alex Brush', Georgia, cursive;
      font-size: 42px;
      color: var(--purple-dark);
    }

    @media (max-width: 600px) {
      h1 .couple   { font-size: 52px; }
      h1 .subtitle { font-size: 34px; }
    }

    .tagline {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      margin: 0 0 36px 0;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 380px;
      margin: 0 auto;
    }

    .choice {
      display: block;
      text-align: center;
      padding: 22px 24px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(74, 74, 74, 0.15);
      transition: transform 0.1s, box-shadow 0.15s;
    }

    .choice:active {
      transform: translateY(2px);
      box-shadow: 0 2px 8px rgba(74, 74, 74, 0.15);
    }

    .choice .emoji {
      display: block;
      font-size: 32px;
      margin-bottom: 6px;
    }

    .choice .sub {
      display: block;
      font-size: 13px;
      font-weight: normal;
      font-style: italic;
      opacity: 0.9;
      margin-top: 4px;
    }

    .choice.gallery {
      background: linear-gradient(135deg, var(--eucalyptus) 0%, var(--eucalyptus-dark) 100%);
    }

    .choice.upload {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
    }

    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
      margin-top: 40px;
      padding: 0 20px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin: 40px 0 10px 0;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>
    <span class="couple">Kyle and Elly's</span>
    <span class="subtitle">Wedding Guest Photobook</span>
  </h1>

  <p class="tagline">Thank you for celebrating with us 💚</p>

  <div class="choices">
    <a class="choice gallery"
       href="https://script.google.com/macros/s/AKfycbzEzKymTaNSY1xiXyb-iEuc1aWnhLMB-hXaC81UMv7UrXQdapWwPfSmyHBHJdeICTOgQg/exec">
      <span class="emoji">🖼️</span>
      View the Photobook
      <span class="sub">Browse photos from the day</span>
    </a>

    <a class="choice upload"
      href="https://script.google.com/macros/s/AKfycbzEzKymTaNSY1xiXyb-iEuc1aWnhLMB-hXaC81UMv7UrXQdapWwPfSmyHBHJdeICTOgQg/exec">
      <span class="emoji">📷</span>
      Share Your Photos
      <span class="sub">Add your favorite moments</span>
    </a>
  </div>

  <p class="hint">If the buttons don't work, please let Kyle or Elly know.</p>

  <footer>With love, Kyle & Elly · August 8, 2026</footer>
</body>
</html>
