# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  workflow_run:
    workflows: ["Sync Guest Gallery", "Sync Photo Booth Gallery"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Gate: skip deploy if main hasn't moved since last successful deploy
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - name: Decide whether to deploy
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          CURRENT_SHA: ${{ github.sha }}
          TRIGGER: ${{ github.event_name }}
        run: |
          set -euo pipefail

          short() { echo "${1:0:7}"; }

          # Manual dispatch always deploys
          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            {
              echo "### 🚀 Deploy decision: **PROCEED**"
              echo ""
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Trigger | \`workflow_dispatch\` (manual) |"
              echo "| Current SHA | \`$(short "$CURRENT_SHA")\` |"
              echo "| Reason | Manual dispatch always deploys |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Look up SHA of last successful deploy of THIS workflow
          LAST_SHA=$(gh run list \
            --workflow="${{ github.workflow }}" \
            --branch=main \
            --status=success \
            --limit=1 \
            --json headSha \
            --jq '.[0].headSha // ""')

          if [ -z "$LAST_SHA" ]; then
            {
              echo "### 🚀 Deploy decision: **PROCEED**"
              echo ""
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Trigger | \`$TRIGGER\` |"
              echo "| Current SHA | \`$(short "$CURRENT_SHA")\` |"
              echo "| Last deployed SHA | _none_ |"
              echo "| Reason | No prior successful deploy found |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "$LAST_SHA" = "$CURRENT_SHA" ]; then
            {
              echo "### ⏭️ Deploy decision: **SKIP**"
              echo ""
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Trigger | \`$TRIGGER\` |"
              echo "| Current SHA | \`$(short "$CURRENT_SHA")\` |"
              echo "| Last deployed SHA | \`$(short "$LAST_SHA")\` |"
              echo "| Reason | SHA unchanged since last successful deploy |"
              echo ""
              echo "_No new commits on \`main\`. Nothing to deploy._"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "### 🚀 Deploy decision: **PROCEED**"
              echo ""
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Trigger | \`$TRIGGER\` |"
              echo "| Current SHA | \`$(short "$CURRENT_SHA")\` |"
              echo "| Last deployed SHA | \`$(short "$LAST_SHA")\` |"
              echo "| Reason | New commits on \`main\` since last deploy |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  # Single deploy job since we're just deploying
  deploy:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### 🎉 Pages deployment complete"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Deployed SHA | \`${GITHUB_SHA:0:7}\` |"
            echo "| Page URL | ${{ steps.deployment.outputs.page_url }} |"
            echo "| Status | \`${{ steps.deployment.outcome }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
