# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Sync Guest Gallery", "Sync Photo Booth Gallery"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Inject deployment ID
        env:
          UPLOAD_DEPLOYMENT_ID: ${{ secrets.UPLOAD_DEPLOYMENT_ID }}
        run: |
          set -euo pipefail
      
          # 1. Verify the secret exists and is non-empty
          if [ -z "${UPLOAD_DEPLOYMENT_ID:-}" ]; then
            echo "::error::UPLOAD_DEPLOYMENT_ID secret is empty or undefined"
            exit 1
          fi
          echo "Secret is present (length: ${#UPLOAD_DEPLOYMENT_ID})"
      
          # 2. Verify at least one file has the placeholder before we start
          if ! grep -l "__UPLOAD_DEPLOYMENT_ID__" *.html >/dev/null 2>&1; then
            echo "::error::No HTML files contain __UPLOAD_DEPLOYMENT_ID__ placeholder"
            exit 1
          fi
      
          echo "Files with placeholder before injection:"
          grep -l "__UPLOAD_DEPLOYMENT_ID__" *.html
      
          # 3. Do the substitution
          sed -i "s|__UPLOAD_DEPLOYMENT_ID__|$UPLOAD_DEPLOYMENT_ID|g" *.html
      
          # 4. Verify no placeholders remain
          if grep -l "__UPLOAD_DEPLOYMENT_ID__" *.html >/dev/null 2>&1; then
            echo "::error::Placeholder still present in some files after injection:"
            grep -l "__UPLOAD_DEPLOYMENT_ID__" *.html
            exit 1
          fi
      
          echo "✅ All placeholders successfully replaced"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
