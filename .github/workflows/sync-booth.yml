name: Sync Photo Booth Gallery

on:
  schedule:
    - cron: "37 * * * *"        # ← DIFF: offset 20 min from guest sync (:17)
  workflow_dispatch:

concurrency:
  group: booth-sync             # ← DIFF: separate group from gallery-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.BOOTH_DRIVE_SA_JSON }}' > sa.json   # ← DIFF: booth SA

      - name: Run sync
        env:
          BOOTH_DRIVE_FOLDER_ID: ${{ secrets.BOOTH_DRIVE_FOLDER_ID }}   # ← DIFF: booth folder
          BOOTH_DRIVE_SA_FILE: sa.json
          PYTHONPATH: scripts
        run: python scripts/sync_booth.py                          # ← DIFF: booth script

      - name: Clean up key
        if: always()
        run: rm -f sa.json

      - name: Commit changes
        run: |
          git config user.name  "booth-sync[bot]"
          git config user.email "booth-sync@users.noreply.github.com"
          git add booth_thumbnails booth_manifest.json  # ← DIFF: booth paths
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync booth ($(date -u +%Y-%m-%dT%H:%MZ))"

          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i). Rebasing on latest main and retrying..."
            git pull --rebase origin main
            sleep 2
          done
          echo "Push failed after 5 attempts."
          exit 1
