<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Share Your Photos — Kyle & Elly's Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="gallery.css">
  <style>
    .upload-form {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--eucalyptus-dark);
      margin-bottom: 6px;
    }

    .field input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--accent-soft);
      border-radius: 12px;
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.85);
      box-sizing: border-box;
    }
    .field input[type="text"]:focus {
      outline: none;
      border-color: var(--eucalyptus-dark);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .file-picker {
      display: block;
      padding: 24px;
      background: rgba(255, 255, 255, 0.85);
      border: 2px dashed var(--accent-soft);
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .file-picker:hover {
      border-color: var(--eucalyptus-dark);
      background: #fff;
    }
    .file-picker input {
      display: none;
    }
    .file-picker .emoji {
      display: block;
      font-size: 36px;
      margin-bottom: 8px;
    }
    .file-picker .label {
      font-size: 16px;
      color: var(--text);
      font-weight: 600;
    }
    .file-picker .hint {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      margin-top: 6px;
    }

    #fileList {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
      color: var(--text);
    }
    #fileList .file-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 8px;
    }
    #fileList .file-row.error {
      background: rgba(200, 100, 100, 0.15);
      color: #a04040;
    }

    button.submit {
      padding: 16px 24px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
      color: #fff;
      font-family: inherit;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(74, 74, 74, 0.15);
      transition: transform 0.1s, box-shadow 0.15s;
    }
    button.submit:active { transform: translateY(2px); }
    button.submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #status {
      text-align: center;
      font-size: 15px;
      padding: 16px;
      border-radius: 12px;
      display: none;
    }
    #status.info    { display: block; background: rgba(156, 175, 136, 0.15); color: var(--eucalyptus-dark); }
    #status.error   { display: block; background: rgba(200, 100, 100, 0.15); color: #a04040; }
    #status.success { display: block; background: rgba(168, 155, 201, 0.15); color: var(--purple-dark); font-weight: 600; }

    #progress {
      height: 6px;
      background: var(--accent-soft);
      border-radius: 3px;
      overflow: hidden;
      display: none;
      margin-top: 8px;
    }
    #progress.active { display: block; }
    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--purple-dark));
      width: 0%;
      transition: width 0.2s;
    }
  </style>
</head>
<body>

  <a class="home-link" href="index.html">
    <span aria-hidden="true">‹</span>
    <span>Home</span>
  </a>

  <h1>
    <span class="couple">Kyle and Elly's</span>
    <span class="subtitle">Share Your Photos</span>
  </h1>

  <p class="tagline">Add your favorite moments from the day 💚</p>

  <form class="upload-form" id="uploadForm" onsubmit="return false;">

    <div class="field">
      <label for="guestName">Your name <span style="color:var(--muted); font-weight:normal;">(optional)</span></label>
      <input type="text" id="guestName" maxlength="60" placeholder="So we know who to thank!">
    </div>

    <label class="file-picker" for="fileInput">
      <span class="emoji">📷</span>
      <span class="label">Tap to choose photos</span>
      <span class="hint">JPG, PNG, or HEIC · up to 25 MB each · up to 20 at a time</span>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/heic,image/heif,image/webp" multiple>
    </label>

    <div id="fileList"></div>

    <button type="button" class="submit" id="submitBtn" disabled>Share Photos</button>

    <div id="progress"><div id="progressBar"></div></div>
    <div id="status"></div>

  </form>

  <footer>With love, thank you for celebrating with us</footer>

  <script>
    // ============================================================
    // CONFIG — set this to your deployed Apps Script /exec URL
    // ============================================================
    var UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbxIiQuwD_pkzrl-YRAn5b8LBU1XqoUIJdDKFlgWrZITPOshfhaDJszPwYqpv36HRoG_/exec';

    var MAX_BYTES = 25 * 1024 * 1024;   // 25 MB
    var MAX_FILES = 20;
    var ALLOWED = /\.(jpe?g|png|heic|heif|webp)$/i;

    var fileInput  = document.getElementById('fileInput');
    var fileList   = document.getElementById('fileList');
    var submitBtn  = document.getElementById('submitBtn');
    var statusEl   = document.getElementById('status');
    var progress   = document.getElementById('progress');
    var progressBar = document.getElementById('progressBar');
    var nameInput  = document.getElementById('guestName');

    var validFiles = [];

    fileInput.addEventListener('change', function() {
      validFiles = [];
      fileList.innerHTML = '';

      var files = Array.from(fileInput.files || []);
      if (files.length > MAX_FILES) {
        showStatus('Please choose up to ' + MAX_FILES + ' photos at a time.', 'error');
        submitBtn.disabled = true;
        return;
      }

      files.forEach(function(f) {
        var row = document.createElement('div');
        row.className = 'file-row';
        var reason = '';
        if (!ALLOWED.test(f.name)) {
          reason = 'unsupported type';
        } else if (f.size > MAX_BYTES) {
          reason = 'too large (' + fmtSize(f.size) + ')';
        }
        if (reason) {
          row.className += ' error';
          row.innerHTML = '<span>' + escapeHtml(f.name) + '</span><span>' + reason + '</span>';
        } else {
          row.innerHTML = '<span>' + escapeHtml(f.name) + '</span><span>' + fmtSize(f.size) + '</span>';
          validFiles.push(f);
        }
        fileList.appendChild(row);
      });

      submitBtn.disabled = validFiles.length === 0;
      if (validFiles.length > 0) {
        statusEl.style.display = 'none';
      }
    });

    submitBtn.addEventListener('click', async function() {
      if (validFiles.length === 0) return;
      submitBtn.disabled = true;
      fileInput.disabled = true;
      nameInput.disabled = true;
      progress.classList.add('active');
      showStatus('Uploading ' + validFiles.length + ' photo(s)…', 'info');

      var guestName = (nameInput.value || '').trim().slice(0, 60);
      var uploaded = 0;
      var failed = [];

      for (var i = 0; i < validFiles.length; i++) {
        var f = validFiles[i];
        try {
          await uploadOne(f, guestName);
          uploaded++;
        } catch (e) {
          failed.push(f.name);
        }
        progressBar.style.width = Math.round(((i + 1) / validFiles.length) * 100) + '%';
      }

      if (failed.length === 0) {
        showStatus('Thanks! Your photo' + (uploaded > 1 ? 's' : '') +
                   ' will appear in the gallery within a few minutes 💚', 'success');
        fileList.innerHTML = '';
        validFiles = [];
        fileInput.value = '';
        submitBtn.textContent = 'Share More Photos';
        submitBtn.disabled = false;
        fileInput.disabled = false;
        nameInput.disabled = false;
      } else {
        showStatus(uploaded + ' uploaded, ' + failed.length + ' failed. ' +
                   'Please try again for: ' + failed.join(', '), 'error');
        submitBtn.disabled = false;
        fileInput.disabled = false;
        nameInput.disabled = false;
      }
    });

    function uploadOne(file, guestName) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() {
          var base64 = reader.result.split(',')[1];
          var payload = new URLSearchParams();
          payload.set('filename', file.name);
          payload.set('mimeType', file.type || 'application/octet-stream');
          payload.set('guestName', guestName);
          payload.set('data', base64);

          fetch(UPLOAD_URL, {
            method: 'POST',
            body: payload
          })
          .then(function(r) { return r.json(); })
          .then(function(res) {
            if (res && res.ok) resolve();
            else reject(new Error(res && res.error ? res.error : 'upload failed'));
          })
          .catch(reject);
        };
        reader.onerror = function() { reject(new Error('read failed')); };
        reader.readAsDataURL(file);
      });
    }

    function showStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = kind;
    }

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>
</body>
</html>
